<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="messages_title">My Bubble — Messages</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="Icons/Logo.png">
</head>
<body>
  <div class="app-container">
    <header class="app-header app-header-nav">
      <div>
        <h1 class="brand-title">
          <img src="Icons/Logo.png" alt="Logo" class="logo-icon">
          <span class="brand-logo-text">Logo</span>
          <span data-i18n="feed_title">Tell ur story</span>
        </h1>
        <p class="subtitle" data-i18n="messages_title">Messages</p>
      </div>
      <nav class="nav">
        <a href="feed.html" class="nav-link nav-link-feed" data-i18n="nav_feed">Лента</a>
        <a href="messages.html" class="nav-link active" data-i18n="nav_messages">Сообщения</a>
        <a href="profile.html" class="nav-link" data-i18n="nav_profile">Профиль</a>
        <select id="languageSelect" class="language-select">
          <option value="cs" data-i18n="lang_cs">Čeština</option>
          <option value="ru" data-i18n="lang_ru">Русский</option>
          <option value="en" data-i18n="lang_en">English</option>
        </select>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Theme">🌓 <span id="themeToggleLabel">Dark</span></button>
        <button id="logoutBtn" class="btn ghost" data-i18n="nav_logout">Выйти</button>
      </nav>
    </header>

    <main class="messages-layout">
      <section class="messages-sidebar card">
        <div class="messages-search-wrap">
          <input type="text" id="messagesSearchInput" class="messages-search-input" data-i18n="messages_search_placeholder" placeholder="Search by username or email...">
        </div>
        <div id="messagesUsersList" class="messages-user-list"></div>
        <div class="messages-conversations-wrap">
          <h3 class="messages-list-title" data-i18n="messages_recent">Recent conversations</h3>
          <div id="messagesConversationsList" class="messages-conversations-list"></div>
        </div>
        <div class="messages-recommendations-wrap">
          <h3 class="messages-list-title" data-i18n="messages_recommendations">Recommendations — write to</h3>
          <div id="messagesRecommendationsList" class="messages-conversations-list"></div>
        </div>
      </section>

      <section class="messages-chat card">
        <div id="messagesChatPlaceholder" class="messages-chat-placeholder" data-i18n="messages_choose_user">Choose a user on the left</div>
        <div id="messagesChatPanel" class="messages-chat-panel" style="display: none;">
          <div id="messagesConversationHeader" class="messages-chat-header">
            <div class="messages-chat-header-user">
              <span class="messages-chat-header-avatar" id="messagesChatHeaderAvatar"></span>
              <div>
                <span id="messagesChatHeaderName" class="messages-chat-header-name"></span>
                <span id="messagesChatHeaderStatus" class="messages-chat-header-status"></span>
              </div>
            </div>
          </div>
          <div id="messagesConversation" class="messages-conversation"></div>
          <div class="messages-input-wrap">
            <textarea id="messagesInput" class="messages-input" rows="2" data-i18n="messages_placeholder" placeholder="Write a message... (Enter to send, Shift+Enter for new line)"></textarea>
            <button id="messagesSendBtn" class="btn primary messages-send-btn" type="button" data-i18n="messages_send">Send</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p data-i18n="messages_footer">Messages are stored on the server in SQL database with encryption.</p>
    </footer>
  </div>

  <script src="translations.js"></script>
  <script src="api.js"></script>
  <script src="script_api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!window.App) return;
      App.requireAuth();
      App.renderMessagesPage();
      if (window.I18n) {
        window.I18n.apply(document);
      }
    });
  </script>
</body>
</html>
